name: Backend CRUD Smoke

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: Public API URL ending in /api
        required: false
        default: https://auto-media-backend.vercel.app/api

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CRUD smoke against API
        env:
          CRUD_CHECK_API_URL: ${{ inputs.api_url }}
          CRUD_CHECK_USERNAME: ${{ secrets.CRUD_CHECK_USERNAME }}
          CRUD_CHECK_PASSWORD: ${{ secrets.CRUD_CHECK_PASSWORD }}
        run: npm run crud:check

